[pg]
# Credentials are injected at runtime via env vars (.env in dev,
# orchestrator secrets in prod) — see .env.example.
#   DATABASE_URL                     overrides [pg].url
#   PREST_PG_URL_<NAME>              overrides each [[pg.urls]] entry by name
url = ""
single = false

[jwt]
default = false

[keto]
readurl = "http://localhost:4466"

[auth]
# Ory Kratos session validation.
# When `enabled = true`, every request must carry a valid session cookie
# (default `ory_kratos_session`). The cookie is validated against
# `browser_url` and the resulting identity ID is injected as a tenant
# filter using the rules under `[[auth.user_id_filters]]`.
#
# For custom SQL templates under `/_QUERIES/...`, the identity ID is
# also exposed as the template variable `userId` (see
# controllers/sql.go::extractContextValues), so templates can write
# `WHERE user_id = {{ sqlVal "userId" }}` and inherit the same tenant
# isolation as the generic table endpoints.

[auth.kratos]
enabled = true
browser_url = "https://kratos.yarsew.example.com"
session_cookie = "ory_kratos_session"
request_timeout = 5

# Public paths bypass Kratos session validation.
# Path patterns: exact ("/foo/bar") or prefix wildcard ("/foo/*").
# Methods is optional; when empty, all methods match.
[[auth.kratos.public_paths]]
path = "/_health"

[[auth.kratos.public_paths]]
path = "/authz/check"

# Custom SQL templates: aggregate reads that the BFF (Next.js) calls
# on behalf of the user. Authenticated as long as Kratos is enabled.
[[auth.kratos.public_paths]]
path = "/_QUERIES/lobehub/*"
methods = ["GET"]

[[auth.kratos.public_paths]]
path = "/_QUERIES/public/*"
methods = ["GET"]

# ---------------------------------------------------------------------------
# Tier 1 — generic table CRUD with auto user_id filtering.
# Each entry tells pREST to inject `WHERE <column> = <identity_id>` for
# every read/write against `{database}/{schema}/{table}`. The BFF can
# keep using its existing tRPC client while it migrates by pointing
# `fetch(PREST_URL + '/lobehub/public/notifications?...')` instead.
# ---------------------------------------------------------------------------
[[auth.user_id_filters]]
database = "yarsew"
schema = "public"
table = "billing_balances"
column = "actor_id"

[[auth.user_id_filters]]
database = "yarsew"
schema = "public"
table = "billing_audit_log"
column = "actor_id"

