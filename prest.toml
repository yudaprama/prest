[pg]
# Connection URL for the default database. Set `DATABASE_URL` (or
# `PREST_PG_URL`) in the environment / .env to inject credentials
# without committing them to this file.
url = ""
single = false

[jwt]
default = false

[auth]
user_id_header = "X-User-Id"

[[auth.user_id_filters]]
database = "yarsew"
schema = "public"
table = "billing_balances"
column = "actor_id"

[[auth.user_id_filters]]
database = "yarsew"
schema = "public"
table = "billing_audit_log"
column = "actor_id"

[[auth.user_id_filters]]
database = "ogmami"
schema = "public"
table = "sessions"
column = "identity_id"

[[auth.user_id_filters]]
database = "ogmami"
schema = "public"
table = "identities"
column = "id"

# Named extra connections. Each entry's `url` is overridden by the
# `PREST_PG_URL_<NAME>` environment variable when set (see .env.example).
# Leaving the URL blank here is the recommended way to keep secrets
# out of source control.
[[pg.urls]]
name = "yarsew"
url = ""

[[pg.urls]]
name = "ogmami"
url = ""
